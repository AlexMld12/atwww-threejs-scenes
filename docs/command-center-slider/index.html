<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Command Center Slider</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        /* Black (not near-white) so any transient gap while the mobile URL bar
           shows/hides is invisible against the dark scene — no white flash. */
        background: #010101;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        overscroll-behavior: none;
      }
      /* The WebGL canvas is pinned to the viewport — this simulates the sticky
         behaviour we'll get in Webflow. #scroll-spacer below gives the page real
         scroll length so window.scrollY can drive the scene.
         Height is 100lvh (LARGE viewport height = URL bar retracted, the tallest
         the viewport can get) with a 100vh fallback. Sizing to the LARGE viewport
         means the fixed canvas always spans the full screen even when the mobile
         URL bar is hidden, so scrolling never exposes the page background. */
      #app {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;   /* fallback for browsers without lvh */
        height: 100lvh;
        z-index: 0;
      }
      #app canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      /* LOCAL-ONLY test scaffold: fake scroll height so we can drive the
         scroll-based rotation before Webflow. In Webflow the parent sticky
         section provides the scroll range and this spacer isn't needed. */
      #scroll-spacer {
        position: relative;
        width: 100%;
        height: 700vh;
        pointer-events: none;
      }
    </style>
    <script type="module" crossorigin src="./assets/command-center.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="scroll-spacer"></div>
  </body>
</html>
